[pytest]
markers =
    unit: deterministic non-service unit and static validation tests
    provider_mirror: RBAC mirroring tests against local or official FAB permission sets
    airflow_runtime: Airflow runtime and plugin boot validation tests
    idp_runtime: identity-provider runtime flow tests and live integration checks
    external_runtime: external validation tests requiring real infrastructure or persisted runtime state
    external_real: tests that talk to externally provided LDAP/Entra resources when configured
    slow: slower contract tests that are heavier than baseline unit tests
