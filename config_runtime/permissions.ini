; =============================================================================
; permissions.ini
; =============================================================================
; Custom LDAP / ITIM / Azure Entra ID auth-manager policy file for Airflow.
;
; This file is the source of truth for:
;   1) authentication provider enablement
;   2) LDAP connection and TLS behavior
;   3) Azure Entra ID SSO behavior
;   4) LDAP DN -> Airflow role mapping
;   5) Entra claim value -> Airflow role mapping
;   6) FAB-style RBAC permissions
;
; -----------------------------------------------------------------------------
; UI notes
; -----------------------------------------------------------------------------
; The login page shown by the custom auth manager now supports:
;   - structured status banners
;   - support/correlation references for failures
;   - responsive two-column layout
;   - right-side help panel
;   - environment badge
;
; The following UI values are environment-driven and are NOT configured here:
;   AIRFLOW_ITIM_UI_ENV_LABEL
;   AIRFLOW_ITIM_UI_SUPPORT_CONTACT
;
; Example systemd usage:
;   Environment="AIRFLOW_ITIM_UI_ENV_LABEL=PROD"
;   Environment="AIRFLOW_ITIM_UI_SUPPORT_CONTACT=Platform support: airflow-support@example.com"
;
; -----------------------------------------------------------------------------
; Optional scoped role filters
; -----------------------------------------------------------------------------
; Future-looking role filters can scope a role to DAG/resource metadata when
; that metadata is available at runtime. They are optional and do not change
; existing role behavior unless a matching ``[role_filters:<role>]`` section is
; added.
;
; Example:
;   [role_filters:Viewer]
;   dag_tags = finance, critical
;   environments = prod
;   resource_prefixes = example_
;
; -----------------------------------------------------------------------------
; Secret references
; -----------------------------------------------------------------------------
; For secret values such as bind_password or client_secret, use:
;   env:VAR_NAME
;   file:/absolute/path/to/secret
;   literal:secret-value
;
; Plaintext secret values can be rejected when:
;   [security]
;   allow_plaintext_secrets = false
;
; -----------------------------------------------------------------------------
; Optional config integrity verification
; -----------------------------------------------------------------------------
; Detached HMAC integrity verification of this file can be enabled through:
;   AIRFLOW_ITIM_LDAP_CONFIG_HMAC_KEY
;   AIRFLOW_ITIM_LDAP_CONFIG_HMAC_KEY_FILE
;   AIRFLOW_ITIM_LDAP_CONFIG_HMAC_SIG_FILE
;
; -----------------------------------------------------------------------------
; Azure callback URI
; -----------------------------------------------------------------------------
; When Azure Entra ID SSO is enabled, register this redirect URI in Entra:
;   https://<your-airflow-host>/auth/oauth-authorized/azure
;
; -----------------------------------------------------------------------------
; Permission model notes
; -----------------------------------------------------------------------------
; This plugin uses FAB-style action/resource semantics:
;   menu_access
;   can_read
;   can_edit
;   can_create
;   can_delete
;
; Resources mirror Airflow/FAB concepts such as:
;   DAGs, DAG Runs, Task Instances, Variables, Connections, Pools, etc.
;
; "*" may be used for full admin wildcard behavior.
; =============================================================================
;
; [meta] versioning notes
; ----------------------
; schema_version pins the permissions.ini layout expected by this plugin build.
; plugin_family prevents cross-loading a config intended for another auth plugin.
; =============================================================================


[meta]
schema_version = 1
plugin_family = rbac_providers_auth_manager


[general]
config_reload_seconds = 30
strict_permissions = true
log_level = DEBUG
deny_if_no_roles = true
; Enterprise-safe default: keep auto-registration off unless you intentionally want
; newly authenticated users to receive the fallback Public role.
auth_user_registration = false
auth_user_registration_role = Public
trusted_proxies = 127.0.0.1/32, 10.0.0.0/8
enable_ldap = true
enable_entra_id = false


[security]
allow_plaintext_secrets = false
sensitive_debug_logging = false
allow_insecure_ldap_tls = false
; Single-worker baseline default. For multi-worker or distributed deployments,
; use redis and configure redis_url explicitly.
rate_limit_backend = memory
redis_url =
redis_prefix = airflow_auth
; Single-worker/browser baseline default. For resilient multi-worker SSO state,
; prefer redis and configure auth_state_redis_url explicitly.
auth_state_backend = cookie
auth_state_redis_url =
auth_state_redis_prefix = airflow_auth_state
auth_state_ttl_seconds = 600
enable_ldap_rate_limit = true
ldap_max_failures = 5
ldap_failure_window_seconds = 300
ldap_lockout_seconds = 900
enable_oauth_rate_limit = true
oauth_max_starts = 30
oauth_window_seconds = 300
oauth_lockout_seconds = 300
enable_pkce = true
allow_graph_group_fallback = false


[ui]
enable_rich_login_status = true
show_environment = true
show_mapped_roles = true
show_reference_id = true
show_auth_method = true
compact_status_details_line = true
compact_success_status_line = true

title_ready = Sign in
title_success = Access granted
title_failure = Sign-in failed
title_no_roles = No Airflow access assigned

ldap_method_label = LDAP Sign-In
entra_method_label = Microsoft Sign-In

ldap_ready_text = Use your enterprise username and password.
ldap_success_text = Your credentials were accepted and Airflow access was assigned.
ldap_no_roles_text = Your credentials were accepted, but no Airflow role is mapped to your account.

entra_ready_text = Use Microsoft Sign-In for enterprise SSO.
entra_progress_text = Completing Microsoft sign-in.
entra_success_text = Microsoft authentication succeeded and Airflow access was assigned.
entra_no_roles_text = Microsoft authentication succeeded, but no Airflow role is mapped to your account.


[jwt]
cookie_httponly = true
cookie_samesite = lax
cookie_path = /
cookie_domain =


[ldap]
enabled = true
server_uri = ldaps://ldap.dot.srv:636
username_dn_format = CN=%s,OU=Shared Enterprise Station Users,OU=Managed Users,OU=1234,DC=MAIN001,DC=AD,DC=ACC,DC=SYS
search_base = OU=Shared Enterprise Station Users,OU=Managed Users,OU=1234,DC=MAIN001,DC=AD,DC=ACC,DC=SYS
uid_attr = uid
username_attr = sAMAccountName
group_attr = memberOf
first_name_attr = givenName
last_name_attr = sn
email_attr = mail
start_tls = false
allow_self_signed = false
tls_ca_cert_file = /etc/pki/ca-trust/source/anchors/corp-ca.pem
tls_require_cert = demand
connect_timeout_seconds = 5
network_timeout_seconds = 10
operation_timeout_seconds = 10
username_pattern = ^[A-Za-z0-9._-]{1,128}$
username_max_length = 128
resolve_nested_groups = false


[entra_id]
enabled = false
tenant_id =
client_id =
client_secret = airflow_var:AIRFLOW_ENTRA_CLIENT_SECRET
provider_name = azure
button_text = Sign in with Microsoft
icon = fa-windows
scope = openid, email, profile, groups
roles_claim_key = groups
verify_signature = true
http_timeout_seconds = 10
http_max_retries = 2
http_retry_backoff_seconds = 1
clock_skew_seconds = 120
allowed_oidc_hosts = login.microsoftonline.com, graph.microsoft.com
username_claim = preferred_username
email_claim = email
first_name_claim = given_name
last_name_claim = family_name
display_name_claim = name
graph_fetch_groups_on_overage = false
graph_memberof_url = https://graph.microsoft.com/v1.0/me/transitiveMemberOf?$select=id,displayName


[role_mapping]
CN=1234_AIRFLOW_VIEWER,OU=CMDB Managed Groups,OU=1234,DC=MAIN001,DC=AD,DC=ACC,DC=SYS = Viewer
; Optional dedicated DAG author role if your directory provides one:
; CN=1234_AIRFLOW_USER,OU=CMDB Managed Groups,OU=1234,DC=MAIN001,DC=AD,DC=ACC,DC=SYS = User
CN=1234_AIRFLOW_EXECUTE,OU=CMDB Managed Groups,OU=1234,DC=MAIN001,DC=AD,DC=ACC,DC=SYS = Op
CN=1234_AIRFLOW_Admin,OU=CMDB Managed Groups,OU=1234,DC=MAIN001,DC=AD,DC=ACC,DC=SYS = Admin


[entra_role_mapping]


