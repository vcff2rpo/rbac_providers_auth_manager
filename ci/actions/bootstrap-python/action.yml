name: bootstrap Python runtime
description: Set up a cached Python runtime for CI jobs after the repository has been checked out.
inputs:
  python-version:
    description: Python version to install.
    required: true
  cache-dependency-path:
    description: Newline-delimited dependency files used for pip cache keys.
    required: false
    default: ''
runs:
  using: composite
  steps:
  - name: Set up Python
    uses: actions/setup-python@v6
    with:
      python-version: ${{ inputs.python-version }}
      cache: pip
      cache-dependency-path: ${{ inputs.cache-dependency-path }}
