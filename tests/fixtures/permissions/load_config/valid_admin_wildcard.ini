[meta]
schema_version = 1
plugin_family = rbac_providers_auth_manager

[general]
enable_ldap = true
enable_entra_id = false
strict_permissions = true
deny_if_no_roles = true
config_reload_seconds = 30
log_level = INFO

[security]
allow_plaintext_secrets = false
rate_limit_backend = memory
auth_state_backend = cookie

[jwt]
cookie_httponly = false
cookie_samesite = lax
cookie_path = /

[ldap]
enabled = true
server_uri = ldaps://ldap.example.com:636
username_dn_format = CN=%s,OU=Users,DC=example,DC=com
search_base = OU=Users,DC=example,DC=com
group_attr = memberOf
uid_attr = uid
username_attr = sAMAccountName
first_name_attr = givenName
last_name_attr = sn
email_attr = mail
allow_self_signed = false
tls_require_cert = demand

[role_mapping]
CN=LDAP_ADMIN,OU=Groups,DC=example,DC=com = Admin

[entra_role_mapping]

[role:Admin]
* = *
