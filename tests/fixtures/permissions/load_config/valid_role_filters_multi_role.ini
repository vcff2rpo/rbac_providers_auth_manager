[meta]
schema_version = 1
plugin_family = rbac_providers_auth_manager

[general]
enable_ldap = true
enable_entra_id = false
strict_permissions = true
log_level = INFO
deny_if_no_roles = true
trusted_proxies = 127.0.0.1/32

[security]
allow_plaintext_secrets = true
rate_limit_backend = memory
auth_state_backend = cookie

[ui]
enable_rich_login_status = true

[jwt]
cookie_samesite = lax
cookie_path = /

[ldap]
enabled = true
server_uri = ldaps://ldap.example.test:636
username_dn_format = CN=%s,OU=Users,DC=example,DC=test
search_base = OU=Users,DC=example,DC=test
uid_attr = uid
username_attr = sAMAccountName
group_attr = memberOf
first_name_attr = givenName
last_name_attr = sn
email_attr = mail
username_pattern = ^[A-Za-z0-9._-]{1,128}$
username_max_length = 128

[role:ScopedFinance]
menu_access = DAGs
can_read = DAGs

[role:ScopedOps]
menu_access = DAGs
can_read = DAGs

[role_filters:ScopedFinance]
dag_tags = finance
environments = prod
resource_prefixes = finance_

[role_filters:ScopedOps]
dag_tags = operations
environments = dr
resource_prefixes = ops_
