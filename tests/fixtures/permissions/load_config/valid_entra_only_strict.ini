[meta]
schema_version = 1
plugin_family = rbac_providers_auth_manager

[general]
enable_ldap = false
enable_entra_id = true
strict_permissions = true
deny_if_no_roles = true
config_reload_seconds = 45
log_level = INFO

[security]
allow_plaintext_secrets = false
rate_limit_backend = memory
auth_state_backend = cookie

[jwt]
cookie_httponly = false
cookie_samesite = lax
cookie_path = /

[ui]
ldap_method_label = Enterprise LDAP
entra_method_label = Microsoft Entra ID

[entra_id]
enabled = true
tenant_id = 11111111-2222-3333-4444-555555555555
client_id = 99999999-8888-7777-6666-555555555555
client_secret = env:ENTRA_CLIENT_SECRET
provider_name = azure
button_text = Sign in with Microsoft
icon = fa-windows
scope = openid, email, profile, groups
roles_claim_key = groups
verify_signature = true
allowed_oidc_hosts = login.microsoftonline.com, graph.microsoft.com

[role_mapping]

[entra_role_mapping]
11111111-2222-3333-4444-555555555555 = Viewer

[role:Viewer]
menu_access = Browse, DAGs
can_read = DAGs, Task Instances
