name: reusable license compliance

on:
  workflow_call:
    inputs:
      package-name:
        description: Python package name
        required: false
        type: string
        default: rbac_providers_auth_manager
      python-version:
        description: Python version for compliance tooling
        required: false
        type: string
        default: "3.13"

permissions:
  contents: read

jobs:
  requirements_usage:
    name: requirements usage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Report requirements file usage
        run: |
          set -o pipefail
          mkdir -p .ci-artifacts/license
          python scripts/ci/report_requirements_usage.py \
            --repo-root . \
            --output-md .ci-artifacts/license/requirements-usage.md \
            --output-json .ci-artifacts/license/requirements-usage.json \
            2>&1 | tee .ci-artifacts/license/requirements-usage.log
      - name: Upload requirements usage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: requirements-usage
          path: .ci-artifacts/license

  license_compliance:
    name: license compliance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: requirements_usage
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install license tooling
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pip-licenses==5.0.0 reuse==5.0.2
      - name: Run license compliance scan
        run: |
          set -o pipefail
          mkdir -p .ci-artifacts/license
          python scripts/ci/check_license_compliance.py \
            --repo-root . \
            --output-md .ci-artifacts/license/license-compliance.md \
            --output-json .ci-artifacts/license/license-compliance.json \
            2>&1 | tee .ci-artifacts/license/license-compliance.log
      - name: Upload license artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-compliance
          path: .ci-artifacts/license

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install SBOM tooling
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install cyclonedx-bom==4.1.0
      - name: Generate SBOM
        run: |
          set -o pipefail
          mkdir -p .ci-artifacts/license
          cyclonedx-py environment --of JSON --output-file .ci-artifacts/license/sbom.json
          cyclonedx-py environment --of XML --output-file .ci-artifacts/license/sbom.xml
          python scripts/ci/summarize_sbom.py \
            --sbom-json .ci-artifacts/license/sbom.json \
            --output-md .ci-artifacts/license/sbom-summary.md \
            2>&1 | tee .ci-artifacts/license/sbom.log
      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: .ci-artifacts/license

  static_security:
    name: static security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install bandit[toml]==1.8.6
      - name: Install Gitleaks binary
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Run Bandit and capture exit code
        run: |
          set +e
          mkdir -p .ci-artifacts/license
          python -m bandit -q -r . -x tests,.ci-artifacts,ci_review -f txt -o .ci-artifacts/license/bandit.txt
          BANDIT_RC=$?
          echo "bandit_rc=$BANDIT_RC" >> "$GITHUB_ENV"
          set -e
      - name: Run Gitleaks and capture exit code
        run: |
          set +e
          gitleaks detect --source . --config .gitleaks.toml --report-path .ci-artifacts/license/gitleaks.json --no-banner
          GITLEAKS_RC=$?
          echo "gitleaks_rc=$GITLEAKS_RC" >> "$GITHUB_ENV"
          set -e
      - name: Render static security summary
        run: |
          {
            echo "# Static security summary"
            echo
            echo "| Check | Exit code |"
            echo "|---|---|"
            echo "| Bandit | ${bandit_rc:-unknown} |"
            echo "| Gitleaks | ${gitleaks_rc:-unknown} |"
            echo
            echo "Files produced: bandit.txt, gitleaks.json"
          } > .ci-artifacts/license/static-security.md
          cat .ci-artifacts/license/static-security.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload static security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-security
          path: .ci-artifacts/license
      - name: Fail on security findings
        run: |
          if [ "${bandit_rc:-1}" != "0" ] || [ "${gitleaks_rc:-1}" != "0" ]; then
            echo "Static security tooling reported findings."
            exit 1
          fi

  summary:
    name: license compliance summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - requirements_usage
      - license_compliance
      - sbom
      - static_security
    steps:
      - name: Print lane result summary
        run: |
          {
            echo "# License compliance lane"
            echo
            echo "| Job | Executed | Result | What was checked |"
            echo "|---|---|---|---|"
            echo "| requirements_usage | [x] yes | ${{ needs.requirements_usage.result }} | requirements*.txt usage across workflows |"
            echo "| license_compliance | [x] yes | ${{ needs.license_compliance.result }} | Apache distribution files, REUSE metadata, dependency license scan, source heuristic scan |"
            echo "| sbom | [x] yes | ${{ needs.sbom.result }} | CycloneDX SBOM JSON/XML generation |"
            echo "| static_security | [x] yes | ${{ needs.static_security.result }} | Bandit plus Gitleaks static scanning |"
          } >> "$GITHUB_STEP_SUMMARY"
          for result in "${{ needs.requirements_usage.result }}" "${{ needs.license_compliance.result }}" "${{ needs.sbom.result }}" "${{ needs.static_security.result }}"; do
            if [ "$result" != "success" ]; then
              exit 1
            fi
          done
