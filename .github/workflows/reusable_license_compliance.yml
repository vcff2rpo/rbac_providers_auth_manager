name: reusable license compliance

on:
  workflow_call:
    inputs:
      package-name:
        description: Python package name
        required: false
        type: string
        default: rbac_providers_auth_manager
      python-version:
        description: Python version for compliance tooling
        required: false
        type: string
        default: "3.13"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  LICENSE_ARTIFACT_DIR: .ci-artifacts/license

jobs:
  requirements_usage:
    name: requirements usage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Report requirements file usage
        run: |
          set -o pipefail
          mkdir -p "$LICENSE_ARTIFACT_DIR"
          python scripts/ci/report_requirements_usage.py \
            --repo-root . \
            --output-md "$LICENSE_ARTIFACT_DIR/requirements-usage.md" \
            --output-json "$LICENSE_ARTIFACT_DIR/requirements-usage.json" \
            2>&1 | tee "$LICENSE_ARTIFACT_DIR/requirements-usage.log"
      - name: Upload requirements usage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: requirements-usage
          path: ${{ env.LICENSE_ARTIFACT_DIR }}

  license_compliance:
    name: license compliance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: requirements_usage
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install license tooling
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pip-licenses==5.0.0 reuse==5.0.2
          python -m pip check
      - name: Run license compliance scan
        run: |
          set -o pipefail
          mkdir -p "$LICENSE_ARTIFACT_DIR"
          python scripts/ci/check_license_compliance.py \
            --repo-root . \
            --output-md "$LICENSE_ARTIFACT_DIR/license-compliance.md" \
            --output-json "$LICENSE_ARTIFACT_DIR/license-compliance.json" \
            2>&1 | tee "$LICENSE_ARTIFACT_DIR/license-compliance.log"
      - name: Upload license artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-compliance
          path: ${{ env.LICENSE_ARTIFACT_DIR }}

  release_readiness:
    name: release readiness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Check release readiness and repository hygiene
        run: |
          set -o pipefail
          mkdir -p "$LICENSE_ARTIFACT_DIR"
          python scripts/ci/check_release_readiness.py \
            --repo-root . \
            --output-md "$LICENSE_ARTIFACT_DIR/release-readiness.md" \
            --output-json "$LICENSE_ARTIFACT_DIR/release-readiness.json" \
            2>&1 | tee "$LICENSE_ARTIFACT_DIR/release-readiness.log"
      - name: Upload release readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness
          path: ${{ env.LICENSE_ARTIFACT_DIR }}

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install SBOM tooling
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install cyclonedx-bom==7.2.1
          python -m pip check
      - name: Generate SBOM
        run: |
          set -o pipefail
          mkdir -p "$LICENSE_ARTIFACT_DIR"
          cyclonedx-py environment --of JSON -o "$LICENSE_ARTIFACT_DIR/sbom.json"
          cyclonedx-py environment --of XML -o "$LICENSE_ARTIFACT_DIR/sbom.xml"
          python scripts/ci/summarize_sbom.py \
            --sbom-json "$LICENSE_ARTIFACT_DIR/sbom.json" \
            --output-md "$LICENSE_ARTIFACT_DIR/sbom-summary.md" \
            2>&1 | tee "$LICENSE_ARTIFACT_DIR/sbom.log"
      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: ${{ env.LICENSE_ARTIFACT_DIR }}

  static_security:
    name: static security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install static security tooling
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install bandit[toml]==1.8.6
      - name: Install Gitleaks binary
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Run Bandit and capture exit code
        run: |
          set +e
          mkdir -p "$LICENSE_ARTIFACT_DIR"
          python -m bandit -q -r . -x .ci-artifacts,ci_review -f txt -o "$LICENSE_ARTIFACT_DIR/bandit.txt"
          BANDIT_RC=$?
          echo "bandit_rc=$BANDIT_RC" >> "$GITHUB_ENV"
          set -e
      - name: Run Gitleaks and capture exit code
        run: |
          set +e
          gitleaks detect --source . --config .gitleaks.toml --report-path "$LICENSE_ARTIFACT_DIR/gitleaks.json" --no-banner
          GITLEAKS_RC=$?
          echo "gitleaks_rc=$GITLEAKS_RC" >> "$GITHUB_ENV"
          set -e
      - name: Render static security summary
        run: |
          python scripts/ci/render_static_security_summary.py \
            --bandit "$LICENSE_ARTIFACT_DIR/bandit.txt" \
            --gitleaks "$LICENSE_ARTIFACT_DIR/gitleaks.json" \
            --bandit-rc "${bandit_rc:-1}" \
            --gitleaks-rc "${gitleaks_rc:-1}" \
            --output-md "$LICENSE_ARTIFACT_DIR/static-security.md" \
            --output-json "$LICENSE_ARTIFACT_DIR/static-security.json"
          cat "$LICENSE_ARTIFACT_DIR/static-security.md" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload static security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-security
          path: ${{ env.LICENSE_ARTIFACT_DIR }}
      - name: Fail on security findings
        run: |
          if [ "${bandit_rc:-1}" != "0" ] || [ "${gitleaks_rc:-1}" != "0" ]; then
            echo "Static security tooling reported findings. Inspect static-security.md and the raw reports."
            exit 1
          fi

  summary:
    name: license compliance summary
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - requirements_usage
      - license_compliance
      - release_readiness
      - sbom
      - static_security
    steps:
      - name: Print lane result summary
        run: |
          {
            echo "# License compliance lane"
            echo
            echo "| Job | Executed | Result | Files used | What was checked |"
            echo "|---|---|---|---|---|"
            echo "| requirements_usage | [x] yes | ${{ needs.requirements_usage.result }} | requirements*.txt, .github/workflows/*.yml | requirements file usage across workflows |"
            echo "| license_compliance | [x] yes | ${{ needs.license_compliance.result }} | LICENSE, NOTICE, REUSE.toml, LICENSES/Apache-2.0.txt, repository sources | Apache distribution files, REUSE metadata, dependency license scan, source heuristic scan |"
            echo "| release_readiness | [x] yes | ${{ needs.release_readiness.result }} | README.md, py.typed, pyproject.toml/setup.py, repository hygiene | release-readiness and committed cache/build-artefact checks |"
            echo "| sbom | [x] yes | ${{ needs.sbom.result }} | installed environment | CycloneDX SBOM JSON/XML generation |"
            echo "| static_security | [x] yes | ${{ needs.static_security.result }} | repository sources, .gitleaks.toml | Bandit plus Gitleaks static scanning with finding summary |"
          } >> "$GITHUB_STEP_SUMMARY"
          for result in \
            "${{ needs.requirements_usage.result }}" \
            "${{ needs.license_compliance.result }}" \
            "${{ needs.release_readiness.result }}" \
            "${{ needs.sbom.result }}" \
            "${{ needs.static_security.result }}"
          do
            if [ "$result" != "success" ]; then
              exit 1
            fi
          done
