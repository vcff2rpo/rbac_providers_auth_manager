name: compliance fast
on:
  pull_request:
    paths:
    - .github/workflows/reusable_license_compliance.yml
    - .github/workflows/compliance_fast.yml
    - LICENSE
    - NOTICE
    - REUSE.toml
    - LICENSES/**
    - .gitleaks.toml
    - pyproject.toml
    - setup.py
    - ci/**
  push:
    branches:
    - main
    - master
    paths:
    - .github/workflows/reusable_license_compliance.yml
    - .github/workflows/compliance_fast.yml
    - LICENSE
    - NOTICE
    - REUSE.toml
    - LICENSES/**
    - .gitleaks.toml
    - pyproject.toml
    - setup.py
    - ci/**
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  resolve_ci_context:
    runs-on: ubuntu-latest
    outputs:
      python_primary: ${{ steps.context.outputs.python_primary }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: ./ci/actions/bootstrap-python
      with:
        python-version: '3.13'
    - id: context
      uses: ./ci/actions/export-ci-context
  license_compliance:
    needs: resolve_ci_context
    uses: ./.github/workflows/reusable_license_compliance.yml
    with:
      package-name: rbac_providers_auth_manager
      python-version: ${{ needs.resolve_ci_context.outputs.python_primary }}
