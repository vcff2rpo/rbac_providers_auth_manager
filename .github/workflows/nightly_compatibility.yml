name: nightly compatibility

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-compatibility-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nightly_compatibility:
    uses: ./.github/workflows/reusable_nightly_compatibility.yml
    with:
      package-name: rbac_providers_auth_manager
      airflow-versions: '["3.1.8"]'
      fab-provider-versions: '["3.5.0"]'
      python-versions: '["3.12", "3.13"]'
