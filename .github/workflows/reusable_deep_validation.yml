name: reusable deep validation

on:
  workflow_call:
    inputs:
      package-name:
        description: Python package name
        required: false
        type: string
        default: rbac_providers_auth_manager
      python-versions:
        description: JSON array of Python versions for the unit/mock test matrix
        required: false
        type: string
        default: '["3.12", "3.13"]'
      coverage-min:
        description: Minimum acceptable line coverage percent for unit/mock tests
        required: false
        type: number
        default: 25

permissions:
  contents: read

env:
  DEEP_ARTIFACT_DIR: .ci-artifacts/deep-validation
  PYTEST_VERBOSE_ARGS: >-
    -vv -rA -s --showlocals --durations=20 --log-cli-level=INFO

jobs:
  test-catalog:
    name: test catalog coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify every CI test is assigned to exactly one workflow suite
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          repo_root = Path.cwd()
          if str(repo_root) not in sys.path:
              sys.path.insert(0, str(repo_root))

          from tests.ci.contract_manifest import ALL_ASSIGNED_FILES, discovered_test_files

          discovered = set(discovered_test_files())
          assigned = set(ALL_ASSIGNED_FILES)
          missing = sorted(discovered - assigned)
          extra = sorted(assigned - discovered)
          if missing or extra:
              print('missing=', missing)
              print('extra=', extra)
              sys.exit(1)
          print('All tests/ci files are assigned to exactly one CI suite.')
          PY

  compile-and-import-smoke:
    name: compile + import smoke (Python 3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PACKAGE_NAME: ${{ inputs['package-name'] }}
      PYTHONPATH: ${{ github.workspace }}/..
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            tests/ci/*.py
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m compileall -q .
      - name: Import smoke test
        run: |
          set -o pipefail
          mkdir -p "$DEEP_ARTIFACT_DIR"
          python -m pytest $PYTEST_VERBOSE_ARGS tests/ci/test_import_smoke.py \
            --junitxml="$DEEP_ARTIFACT_DIR/import-smoke.xml" 2>&1 | tee "$DEEP_ARTIFACT_DIR/import-smoke.log"
      - if: always()
        run: |
          python scripts/ci/summarize_ci_artifacts.py \
            --artifact-dir "$DEEP_ARTIFACT_DIR" \
            --lane-name "deep validation" \
            --output-md "$DEEP_ARTIFACT_DIR/artifact-summary.md"
          cat "$DEEP_ARTIFACT_DIR/artifact-summary.md" >> "$GITHUB_STEP_SUMMARY"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deep-validation-import-smoke
          path: |
            ${{ env.DEEP_ARTIFACT_DIR }}/import-smoke.log
            ${{ env.DEEP_ARTIFACT_DIR }}/import-smoke.xml
            ${{ env.DEEP_ARTIFACT_DIR }}/artifact-summary.md
            ${{ env.DEEP_ARTIFACT_DIR }}/bootstrap-imports-scope.md

  unit-and-mock-tests:
    name: unit + mock tests (${{ matrix.group-name }}, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs['python-versions']) }}
        group-name:
          - config-runtime
          - authorization-routes
          - provider-simulations
    env:
      PACKAGE_NAME: ${{ inputs['package-name'] }}
      PYTHONPATH: ${{ github.workspace }}/..
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            tests/ci/*.py
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: python -m pip install -r requirements-dev.txt
      - name: Resolve test shard
        run: |
          mkdir -p "$DEEP_ARTIFACT_DIR"
          echo "TEST_FILES=$(python scripts/ci/list_contract_tests.py --group '${{ matrix.group-name }}')" >> "$GITHUB_ENV"
          python scripts/ci/render_ci_scope_summary.py \
            --title "deep validation shard: ${{ matrix.group-name }}"             --group "${{ matrix.group-name }}"             --output "$DEEP_ARTIFACT_DIR/${{ matrix.group-name }}-scope-${{ matrix.python-version }}.md"
          cat "$DEEP_ARTIFACT_DIR/${{ matrix.group-name }}-scope-${{ matrix.python-version }}.md" >> "$GITHUB_STEP_SUMMARY"
      - name: Run shard with coverage
        run: |
          set -o pipefail
          mkdir -p "$DEEP_ARTIFACT_DIR"
          python -m pytest $PYTEST_VERBOSE_ARGS \
            --maxfail=1 \
            --disable-warnings \
            --cov="$PACKAGE_NAME" \
            --cov-report=term-missing \
            --cov-report=xml:$DEEP_ARTIFACT_DIR/coverage-${{ matrix.group-name }}-${{ matrix.python-version }}.xml \
            --cov-fail-under=${{ inputs['coverage-min'] }} \
            --junitxml="$DEEP_ARTIFACT_DIR/pytest-${{ matrix.group-name }}-${{ matrix.python-version }}.xml" \
            $TEST_FILES 2>&1 | tee "$DEEP_ARTIFACT_DIR/pytest-${{ matrix.group-name }}-${{ matrix.python-version }}.log"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deep-validation-${{ matrix.group-name }}-py${{ matrix.python-version }}
          path: |
            ${{ env.DEEP_ARTIFACT_DIR }}/coverage-${{ matrix.group-name }}-${{ matrix.python-version }}.xml
            ${{ env.DEEP_ARTIFACT_DIR }}/pytest-${{ matrix.group-name }}-${{ matrix.python-version }}.xml
            ${{ env.DEEP_ARTIFACT_DIR }}/pytest-${{ matrix.group-name }}-${{ matrix.python-version }}.log
            ${{ env.DEEP_ARTIFACT_DIR }}/${{ matrix.group-name }}-scope-${{ matrix.python-version }}.md

  dead-code:
    name: dead code scan (Python 3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            tests/ci/*.py
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install vulture==2.14
      - run: python -m vulture . tests --min-confidence 80

  summary:
    name: deep validation summary
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - test-catalog
      - compile-and-import-smoke
      - unit-and-mock-tests
      - dead-code
    steps:
      - run: |
          echo "test-catalog=${{ needs.test-catalog.result }}"
          echo "compile-and-import-smoke=${{ needs.compile-and-import-smoke.result }}"
          echo "unit-and-mock-tests=${{ needs.unit-and-mock-tests.result }}"
          echo "dead-code=${{ needs.dead-code.result }}"
      - run: |
          results=(
            "${{ needs.test-catalog.result }}"
            "${{ needs.compile-and-import-smoke.result }}"
            "${{ needs.unit-and-mock-tests.result }}"
            "${{ needs.dead-code.result }}"
          )
          for result in "${results[@]}"; do
            [ "$result" = success ] || exit 1
          done
