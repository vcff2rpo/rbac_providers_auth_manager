name: reusable deep validation

on:
  workflow_call:
    inputs:
      package-name:
        description: Python package name
        required: false
        type: string
        default: rbac_providers_auth_manager
      python-versions:
        description: JSON array of Python versions for the unit/mock test matrix
        required: false
        type: string
        default: '["3.12", "3.13"]'
      coverage-min:
        description: Minimum acceptable line coverage percent for unit/mock tests
        required: false
        type: number
        default: 25

permissions:
  contents: read

env:
  NON_SERVICE_TESTS: >-
    tests/ci/test_authorization_policy.py
    tests/ci/test_browser_token_flow_matrix.py
    tests/ci/test_config_matrix.py
    tests/ci/test_config_runtime.py
    tests/ci/test_entra_backend_simulation.py
    tests/ci/test_entra_browser_flow_integration.py
    tests/ci/test_identity_mapping_matrix.py
    tests/ci/test_import_smoke.py
    tests/ci/test_ldap_backend_simulation.py
    tests/ci/test_permissions_ini_scenarios.py
    tests/ci/test_runtime_security_and_logging.py
    tests/ci/test_runtime_smoke.py
  DEEP_ARTIFACT_DIR: .ci-artifacts/deep-validation
  PYTEST_VERBOSE_ARGS: >-
    -vv -rA -s --showlocals --durations=20 --log-cli-level=INFO

jobs:
  test-catalog:
    name: test catalog coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify every CI test is assigned to exactly one workflow suite
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys

          discovered = {path.as_posix() for path in Path('tests/ci').glob('test_*.py')}
          deep_validation = {
              'tests/ci/test_authorization_policy.py',
              'tests/ci/test_browser_token_flow_matrix.py',
              'tests/ci/test_config_matrix.py',
              'tests/ci/test_config_runtime.py',
              'tests/ci/test_entra_backend_simulation.py',
              'tests/ci/test_fab_provider_mirror_latest.py',
              'tests/ci/test_fab_role_static_mirror.py',
              'tests/ci/test_entra_browser_flow_integration.py',
              'tests/ci/test_identity_mapping_matrix.py',
              'tests/ci/test_import_smoke.py',
              'tests/ci/test_ldap_backend_simulation.py',
              'tests/ci/test_permissions_ini_scenarios.py',
              'tests/ci/test_runtime_security_and_logging.py',
              'tests/ci/test_runtime_smoke.py',
          }
          airflow_suite = {
              'tests/ci/test_airflow_smoke.py',
          }
          idp_suite = {
              'tests/ci/test_ldap_live_container_integration.py',
          }
          fab_suite = {
              'tests/ci/test_fab_provider_mirror_latest.py',
          }

          assigned = deep_validation | airflow_suite | idp_suite | fab_suite
          missing = sorted(discovered - assigned)
          extra = sorted(assigned - discovered)
          overlaps = []
          suites = {
              'deep_validation': deep_validation,
              'airflow_suite': airflow_suite,
              'identity_provider_integration': idp_suite,
              'fab_provider_validation': fab_suite,
          }
          names = list(suites)
          for idx, left in enumerate(names):
              for right in names[idx + 1:]:
                  both = sorted(suites[left] & suites[right])
                  if both:
                      overlaps.append((left, right, both))

          if missing or extra or overlaps:
              print('discovered=', sorted(discovered))
              print('assigned=', sorted(assigned))
              if missing:
                  print('missing=', missing)
              if extra:
                  print('extra=', extra)
              if overlaps:
                  print('overlaps=', overlaps)
              sys.exit(1)

          print('All tests/ci files are assigned to exactly one CI suite.')
          PY

  compile-and-import-smoke:
    name: compile + import smoke (Python 3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PACKAGE_NAME: ${{ inputs['package-name'] }}
      PYTHONPATH: ${{ github.workspace }}/..

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            tests/ci/*.py

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile all Python sources
        run: python -m compileall -q .

      - name: Import smoke test
        run: |
          set -o pipefail
          mkdir -p "$DEEP_ARTIFACT_DIR"
          python -m pytest $PYTEST_VERBOSE_ARGS tests/ci/test_import_smoke.py \
            --junitxml="$DEEP_ARTIFACT_DIR/import-smoke.xml" 2>&1 | tee "$DEEP_ARTIFACT_DIR/import-smoke.log"

      - name: Upload import smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deep-validation-import-smoke
          path: |
            ${{ env.DEEP_ARTIFACT_DIR }}/import-smoke.log
            ${{ env.DEEP_ARTIFACT_DIR }}/import-smoke.xml

  unit-and-mock-tests:
    name: unit + mock tests (${{ matrix.group-name }}, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs['python-versions']) }}
        include:
          - group-name: config-runtime
            test-files: >-
              tests/ci/test_config_matrix.py
              tests/ci/test_config_runtime.py
              tests/ci/test_fab_role_static_mirror.py
              tests/ci/test_identity_mapping_matrix.py
              tests/ci/test_permissions_ini_scenarios.py
              tests/ci/test_runtime_security_and_logging.py
              tests/ci/test_runtime_smoke.py
          - group-name: authorization-routes
            test-files: >-
              tests/ci/test_authorization_policy.py
              tests/ci/test_browser_token_flow_matrix.py
              tests/ci/test_import_smoke.py
          - group-name: provider-simulations
            test-files: >-
              tests/ci/test_ldap_backend_simulation.py
              tests/ci/test_entra_backend_simulation.py
              tests/ci/test_entra_browser_flow_integration.py
    env:
      PACKAGE_NAME: ${{ inputs['package-name'] }}
      PYTHONPATH: ${{ github.workspace }}/..

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            tests/ci/*.py

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run sharded unit, matrix, and mock tests with coverage and verbose output
        run: |
          set -o pipefail
          mkdir -p "$DEEP_ARTIFACT_DIR"
          python -m pytest $PYTEST_VERBOSE_ARGS \
            --maxfail=1 \
            --disable-warnings \
            --junitxml="$DEEP_ARTIFACT_DIR/pytest-${{ matrix.group-name }}-${{ matrix.python-version }}.xml" \
            --cov="$PACKAGE_NAME" \
            --cov-report=term-missing \
            --cov-report=xml:$DEEP_ARTIFACT_DIR/coverage-${{ matrix.group-name }}-${{ matrix.python-version }}.xml \
            --cov-fail-under=${{ inputs['coverage-min'] }} \
            ${{ matrix.test-files }} 2>&1 | tee "$DEEP_ARTIFACT_DIR/pytest-${{ matrix.group-name }}-${{ matrix.python-version }}.log"

      - name: Upload matrix logs and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deep-validation-${{ matrix.group-name }}-py${{ matrix.python-version }}
          path: |
            ${{ env.DEEP_ARTIFACT_DIR }}/pytest-${{ matrix.group-name }}-${{ matrix.python-version }}.log
            ${{ env.DEEP_ARTIFACT_DIR }}/pytest-${{ matrix.group-name }}-${{ matrix.python-version }}.xml
            ${{ env.DEEP_ARTIFACT_DIR }}/coverage-${{ matrix.group-name }}-${{ matrix.python-version }}.xml

  dead-code:
    name: dead code scan (Python 3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: ${{ github.workspace }}/..

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            tests/ci/*.py

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install validation dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install vulture==2.14

      - name: Run Vulture
        run: python -m vulture . tests --min-confidence 80

  summary:
    name: deep validation summary
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - test-catalog
      - compile-and-import-smoke
      - unit-and-mock-tests
      - dead-code

    steps:
      - name: Print job results
        run: |
          echo "test-catalog=${{ needs.test-catalog.result }}"
          echo "compile-and-import-smoke=${{ needs.compile-and-import-smoke.result }}"
          echo "unit-and-mock-tests=${{ needs.unit-and-mock-tests.result }}"
          echo "dead-code=${{ needs.dead-code.result }}"
          {
            echo "# Deep validation summary"
            echo ""
            echo "- test-catalog: ${{ needs.test-catalog.result }}"
            echo "- compile-and-import-smoke: ${{ needs.compile-and-import-smoke.result }}"
            echo "- unit-and-mock-tests: ${{ needs.unit-and-mock-tests.result }}"
            echo "- dead-code: ${{ needs.dead-code.result }}"
            echo ""
            echo "Expected rich artifacts: deep-validation-import-smoke and per-matrix deep-validation-* uploads"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any deep validation job failed
        run: |
          results=(
            "${{ needs.test-catalog.result }}"
            "${{ needs.compile-and-import-smoke.result }}"
            "${{ needs.unit-and-mock-tests.result }}"
            "${{ needs.dead-code.result }}"
          )

          for result in "${results[@]}"; do
            if [ "$result" != "success" ]; then
              echo "At least one deep validation job failed."
              exit 1
            fi
          done

          echo "All deep validation jobs passed."
