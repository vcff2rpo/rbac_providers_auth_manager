name: reusable identity provider integration

on:
  workflow_call:
    inputs:
      package-name:
        description: Python package name
        required: false
        type: string
        default: rbac_providers_auth_manager
      python-version:
        description: Python version for identity-provider integration tests
        required: false
        type: string
        default: "3.13"

permissions:
  contents: read

jobs:
  identity-provider-integration:
    name: identity provider integration (Python ${{ inputs.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PACKAGE_NAME: ${{ inputs.package-name }}
      PYTHONPATH: ${{ github.workspace }}/..
      LDAP_TEST_URI: ldap://127.0.0.1:1389
      LDAP_TEST_BIND_DN: cn=admin,dc=example,dc=org
      LDAP_TEST_BIND_PASSWORD: adminpassword
      LDAP_TEST_USER_BASE_DN: ou=users,dc=example,dc=org
      LDAP_TEST_SEARCH_BASE: ou=users,dc=example,dc=org
      LDAP_TEST_USER_FILTER: (uid={username})
      LDAP_TEST_USERNAME: user01
      LDAP_TEST_PASSWORD: bitnami1
      IDP_ARTIFACT_DIR: .ci-artifacts/idp

    services:
      ldap:
        image: symas/openldap:latest
        env:
          LDAP_PORT_NUMBER: 1389
          LDAP_ROOT: dc=example,dc=org
          LDAP_ADMIN_USERNAME: admin
          LDAP_ADMIN_PASSWORD: adminpassword
          LDAP_USERS: user01
          LDAP_PASSWORDS: bitnami1
          LDAP_USER_OU: users
          LDAP_GROUP_OU: groups
          LDAP_GROUP: readers
          LDAP_ALLOW_ANON_BINDING: no
          SYMAS_DEBUG: "true"
        ports:
          - 1389:1389

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            tests/ci/*.py

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install build prerequisites for python-ldap
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libldap2-dev libsasl2-dev libssl-dev

      - name: Install test dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install python-ldap requests

      - name: Wait for LDAP service
        run: |
          mkdir -p "$IDP_ARTIFACT_DIR"
          python - <<'PY' 2>&1 | tee "$IDP_ARTIFACT_DIR/ldap-wait.log"
          import socket
          import time

          host = "127.0.0.1"
          port = 1389
          for attempt in range(1, 61):
              try:
                  with socket.create_connection((host, port), timeout=2):
                      print(f"LDAP port became reachable on attempt {attempt}")
                      break
              except OSError as exc:
                  print(f"waiting for LDAP service attempt={attempt} error={exc}")
                  time.sleep(2)
          else:
              raise SystemExit("LDAP service did not become reachable in time")
          PY

      - name: LDAP bind smoke
        run: |
          python - <<'PY' 2>&1 | tee "$IDP_ARTIFACT_DIR/ldap-bind.log"
          import ldap
          import os
          import time

          uri = os.environ["LDAP_TEST_URI"]
          bind_dn = os.environ["LDAP_TEST_BIND_DN"]
          bind_password = os.environ["LDAP_TEST_BIND_PASSWORD"]

          for attempt in range(1, 16):
              conn = None
              try:
                  conn = ldap.initialize(uri)
                  conn.simple_bind_s(bind_dn, bind_password)
                  print(f"LDAP bind succeeded on attempt {attempt}")
                  break
              except ldap.LDAPError as exc:
                  print(f"LDAP bind not ready yet attempt={attempt} error={exc}")
                  time.sleep(2)
              finally:
                  if conn is not None:
                      try:
                          conn.unbind_s()
                      except Exception:
                          pass
          else:
              raise SystemExit("LDAP bind smoke never succeeded")
          PY

      - name: Run identity-provider integration tests with detailed logs
        run: |
          set -o pipefail
          python -m pytest -vv -rA -s --showlocals --durations=20 --log-cli-level=INFO \
            --maxfail=1 \
            --disable-warnings \
            --junitxml="$IDP_ARTIFACT_DIR/pytest-idp.xml" \
            tests/ci/test_ldap_live_container_integration.py \
            tests/ci/test_entra_browser_flow_integration.py 2>&1 | tee "$IDP_ARTIFACT_DIR/pytest-idp.log"

      - name: Capture LDAP container logs
        if: always()
        run: |
          docker ps --format '{{.ID}} {{.Image}} {{.Names}}' | tee "$IDP_ARTIFACT_DIR/docker-ps.log"
          container_id="$(docker ps -q --filter ancestor=symas/openldap:latest | head -n1 || true)"
          if [ -n "$container_id" ]; then
            docker logs "$container_id" > "$IDP_ARTIFACT_DIR/ldap-container.log" 2>&1 || true
          else
            echo "No LDAP container found for symas/openldap:latest" > "$IDP_ARTIFACT_DIR/ldap-container.log"
          fi
          {
            echo "# Identity provider integration summary"
            echo ""
            echo "- ldap-wait.log"
            echo "- ldap-bind.log"
            echo "- pytest-idp.log"
            echo "- ldap-container.log"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload identity-provider artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: identity-provider-integration-py${{ inputs.python-version }}
          path: ${{ env.IDP_ARTIFACT_DIR }}
