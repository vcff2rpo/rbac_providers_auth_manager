name: reusable identity provider integration
on:
  workflow_call:
    inputs:
      package-name:
        description: Python package name
        required: false
        type: string
        default: rbac_providers_auth_manager
      python-version:
        description: Python version for identity-provider integration tests
        required: false
        type: string
        default: '3.13'
permissions:
  contents: read
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  identity-provider-integration:
    name: identity provider integration (Python ${{ inputs.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PACKAGE_NAME: ${{ inputs.package-name }}
      PYTHONPATH: ${{ github.workspace }}/..
      LDAP_TEST_URI: ldap://127.0.0.1:1389
      LDAP_TEST_BIND_DN: cn=admin,dc=example,dc=org
      LDAP_TEST_BIND_PASSWORD: adminpassword
      LDAP_TEST_USER_BASE_DN: ou=users,dc=example,dc=org
      LDAP_TEST_SEARCH_BASE: ou=users,dc=example,dc=org
      LDAP_TEST_USER_FILTER: (uid={username})
      LDAP_TEST_USERNAME: user01
      LDAP_TEST_PASSWORD: bitnami1
      IDP_ARTIFACT_DIR: .ci-artifacts/idp
    services:
      ldap:
        image: symas/openldap:latest
        env:
          LDAP_PORT_NUMBER: 1389
          LDAP_ROOT: dc=example,dc=org
          LDAP_ADMIN_USERNAME: admin
          LDAP_ADMIN_PASSWORD: adminpassword
          LDAP_USERS: user01
          LDAP_PASSWORDS: bitnami1
          LDAP_USER_OU: users
          LDAP_GROUP_OU: groups
          LDAP_GROUP: readers
          LDAP_ALLOW_ANON_BINDING: false
          SYMAS_DEBUG: 'true'
        ports:
        - 1389:1389
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: ./ci/actions/bootstrap-python
      with:
        python-version: ${{ inputs.python-version }}
        cache-dependency-path: 'ci/requirements/requirements-dev.txt

          tests/ci/*.py

          '
    - uses: ./ci/actions/install-ldap-build-deps
    - uses: ./ci/actions/install-python-deps
      with:
        requirements-files: 'ci/requirements/requirements-dev.txt

          '
        extra-packages: python-ldap requests
    - name: Wait for LDAP service
      run: 'mkdir -p "$IDP_ARTIFACT_DIR"

        python ci/scripts/idp_wait_for_ldap.py 2>&1 | tee "$IDP_ARTIFACT_DIR/ldap-wait.log"

        '
    - name: LDAP bind smoke
      run: 'python ci/scripts/idp_ldap_bind_smoke.py 2>&1 | tee "$IDP_ARTIFACT_DIR/ldap-bind.log"

        '
    - name: Run identity-provider integration tests with detailed logs
      run: "set -o pipefail\npython -m pytest -vv -rA -s --showlocals --durations=20 --log-cli-level=INFO \\\n  --maxfail=1 \\\n  --disable-warnings \\\n  --junitxml=\"$IDP_ARTIFACT_DIR/pytest-idp.xml\" \\\n  tests/ci/test_ldap_live_container_integration.py \\\n  tests/ci/test_entra_browser_flow_integration.py 2>&1 | tee \"$IDP_ARTIFACT_DIR/pytest-idp.log\"\n"
    - name: Capture LDAP container logs
      if: always()
      run: "docker ps --format '{{.ID}} {{.Image}} {{.Names}}' | tee \"$IDP_ARTIFACT_DIR/docker-ps.log\"\ncontainer_id=\"$(docker ps -q --filter ancestor=symas/openldap:latest | head -n1 || true)\"\nif [ -n \"$container_id\" ]; then\n  docker logs \"$container_id\" > \"$IDP_ARTIFACT_DIR/ldap-container.log\" 2>&1 || true\nelse\n  echo \"No LDAP container found for symas/openldap:latest\" > \"$IDP_ARTIFACT_DIR/ldap-container.log\"\nfi\n{\n  echo \"# Identity provider integration summary\"\n  echo \"\"\n  echo \"- ldap-wait.log\"\n  echo \"- ldap-bind.log\"\n  echo \"- pytest-idp.log\"\n  echo \"- ldap-container.log\"\n} >> \"$GITHUB_STEP_SUMMARY\"\n"
    - uses: ./ci/actions/render-ci-scope-summary
      if: always()
      with:
        title: identity provider integration scope
        suite: identity_provider_integration
        output: $IDP_ARTIFACT_DIR/idp-scope.md
    - name: Build identity provider integration artifact summary
      if: always()
      uses: ./ci/actions/summarize-ci-artifacts
      with:
        artifact-dir: ${{ env.IDP_ARTIFACT_DIR }}
        lane-name: identity provider integration
        output-md: ${{ env.IDP_ARTIFACT_DIR }}/artifact-summary.md
    - name: Upload identity-provider artifacts
      if: always()
      uses: ./ci/actions/upload-artifact-bundle
      with:
        name: identity-provider-integration-py${{ inputs.python-version }}
        path: '${{ env.IDP_ARTIFACT_DIR }}

          ${{ env.IDP_ARTIFACT_DIR }}/idp-scope.md

          '
