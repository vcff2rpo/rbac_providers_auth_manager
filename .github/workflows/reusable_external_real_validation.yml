name: reusable external real validation

on:
  workflow_call:
    inputs:
      package-name:
        description: Python package name
        required: false
        type: string
        default: rbac_providers_auth_manager
      airflow-version:
        description: Airflow version to install for DB-backed validation
        required: false
        type: string
        default: "3.1.8"
      fab-provider-version:
        description: FAB provider version for DB-backed validation
        required: false
        type: string
        default: "3.5.0"
      python-version:
        description: Python version for external validation
        required: false
        type: string
        default: "3.13"
      require-external-secrets:
        description: Fail instead of skip when external LDAP/Entra secrets are missing
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  external-real-validation:
    name: external real validation (Python ${{ inputs.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PACKAGE_NAME: ${{ inputs['package-name'] }}
      AIRFLOW_VERSION: ${{ inputs['airflow-version'] }}
      FAB_PROVIDER_VERSION: ${{ inputs['fab-provider-version'] }}
      PYTHONPATH: ${{ github.workspace }}/..
      EXTERNAL_ARTIFACT_DIR: .ci-artifacts/external-real
      REQUIRE_EXTERNAL_SECRETS: ${{ inputs['require-external-secrets'] }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-external-real-validation.txt
            tests/ci/*.py

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install build prerequisites for python-ldap
        run: bash scripts/ci/install_python_ldap_build_deps.sh

      - name: Resolve Airflow constraints URL
        run: |
          echo "AIRFLOW_CONSTRAINTS_URL=https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${{ inputs.python-version }}.txt" >> "$GITHUB_ENV"

      - name: Install Airflow core and FAB provider with constraints
        run: |
          python -m pip install "apache-airflow==${AIRFLOW_VERSION}" --constraint "${AIRFLOW_CONSTRAINTS_URL}"
          python -m pip install "apache-airflow-providers-fab==${FAB_PROVIDER_VERSION}" --constraint "${AIRFLOW_CONSTRAINTS_URL}"
          python -m pip install -r requirements-external-real-validation.txt

      - name: Initialize Airflow runtime paths
        run: |
          echo "AIRFLOW_HOME=${RUNNER_TEMP}/airflow-home" >> "$GITHUB_ENV"
          echo "AIRFLOW_CONFIG=${RUNNER_TEMP}/airflow-home/airflow.cfg" >> "$GITHUB_ENV"
          echo "AIRFLOW_DATA_DIR=${RUNNER_TEMP}/airflow-home/data" >> "$GITHUB_ENV"
          echo "AIRFLOW_PLUGINS_DIR=${RUNNER_TEMP}/airflow-home/plugins" >> "$GITHUB_ENV"
          echo "AIRFLOW_DAGS_DIR=${RUNNER_TEMP}/airflow-home/dags" >> "$GITHUB_ENV"
          echo "AIRFLOW_DB_PATH=${RUNNER_TEMP}/airflow-home/airflow.db" >> "$GITHUB_ENV"
          echo "AIRFLOW_PLUGIN_ZIP=${RUNNER_TEMP}/airflow-home/plugins/rbac_providers_auth_manager.zip" >> "$GITHUB_ENV"
          echo "AIRFLOW_PERMISSIONS_INI=${RUNNER_TEMP}/airflow-home/plugins/rbac_providers_auth_manager_permissions.ini" >> "$GITHUB_ENV"

      - name: Bootstrap runtime and write CI config
        run: |
          set -euo pipefail
          mkdir -p "$AIRFLOW_HOME" "$AIRFLOW_DATA_DIR" "$AIRFLOW_PLUGINS_DIR" "$AIRFLOW_DAGS_DIR" "$EXTERNAL_ARTIFACT_DIR"
          python scripts/ci/bootstrap_airflow_runtime.py 2>&1 | tee "$EXTERNAL_ARTIFACT_DIR/bootstrap-runtime.log"
          echo "PYTHONPATH=${AIRFLOW_PLUGIN_ZIP}" >> "$GITHUB_ENV"
          python scripts/ci/write_airflow_ci_config.py 2>&1 | tee "$EXTERNAL_ARTIFACT_DIR/write-airflow-config.log"
          python scripts/ci/create_hello_world_dag.py 2>&1 | tee "$EXTERNAL_ARTIFACT_DIR/create-hello-dag.log"

      - name: Bootstrap Airflow DB and initialize auth manager
        run: |
          set -euo pipefail
          python -m airflow db migrate 2>&1 | tee "$EXTERNAL_ARTIFACT_DIR/airflow-db-migrate.log"
          AIRFLOW__LOGGING__LOGGING_LEVEL=INFO python -m airflow api-server >"$EXTERNAL_ARTIFACT_DIR/api-server.log" 2>&1 &
          API_PID=$!
          echo "$API_PID" > "$EXTERNAL_ARTIFACT_DIR/api-server.pid"
          for i in $(seq 1 40); do
            if curl -fsS "http://127.0.0.1:8080/api/v2/monitor/health" >"$EXTERNAL_ARTIFACT_DIR/health.json"; then
              break
            fi
            sleep 2
          done
          curl -fsS "http://127.0.0.1:8080/auth/login/" > "$EXTERNAL_ARTIFACT_DIR/auth-login.html" || true
          tail -n 120 "$EXTERNAL_ARTIFACT_DIR/api-server.log" || true

      - name: Run DB-backed and external identity validation tests
        run: |
          set -o pipefail
          python -m pytest -vv -rA -s --showlocals --durations=20 --log-cli-level=INFO \
            --maxfail=1 \
            --disable-warnings \
            --junitxml="$EXTERNAL_ARTIFACT_DIR/pytest-external-real.xml" \
            $(python scripts/ci/list_contract_tests.py --suite external_real_validation) 2>&1 | tee "$EXTERNAL_ARTIFACT_DIR/pytest-external-real.log"

      - name: Build external validation artifact summary
        if: always()
        run: |
          python scripts/ci/render_ci_scope_summary.py \
            --title "external real validation scope"             --suite external_real_validation             --output "$EXTERNAL_ARTIFACT_DIR/external-real-scope.md"
          cat "$EXTERNAL_ARTIFACT_DIR/external-real-scope.md" >> "$GITHUB_STEP_SUMMARY"
          python scripts/ci/summarize_ci_artifacts.py \
            --artifact-dir "$EXTERNAL_ARTIFACT_DIR"             --lane-name "external real validation"             --output-md "$EXTERNAL_ARTIFACT_DIR/artifact-summary.md"
          cat "$EXTERNAL_ARTIFACT_DIR/artifact-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Stop API server
        if: always()
        run: |
          if [ -f "$EXTERNAL_ARTIFACT_DIR/api-server.pid" ]; then
            API_PID="$(cat "$EXTERNAL_ARTIFACT_DIR/api-server.pid")"
            kill "$API_PID" >/dev/null 2>&1 || true
            wait "$API_PID" >/dev/null 2>&1 || true
          fi

      - name: Upload external validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-real-validation-py${{ inputs.python-version }}
          path: |
            ${{ env.EXTERNAL_ARTIFACT_DIR }}
            ${{ env.EXTERNAL_ARTIFACT_DIR }}/external-real-scope.md
