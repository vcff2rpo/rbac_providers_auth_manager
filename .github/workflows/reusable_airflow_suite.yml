name: reusable airflow suite

on:
  workflow_call:
    inputs:
      package-name:
        description: Python package name
        required: false
        type: string
        default: rbac_providers_auth_manager
      airflow-version:
        description: Airflow version to install
        required: false
        type: string
        default: "3.1.8"
      py312-version:
        description: Python version for the first Airflow integration lane
        required: false
        type: string
        default: "3.12"
      py313-version:
        description: Python version for the second Airflow integration lane
        required: false
        type: string
        default: "3.13"
    outputs:
      result_summary:
        description: Summary of the Airflow integration lane results
        value: ${{ jobs.summary.outputs.result_summary }}

permissions:
  contents: read

jobs:
  airflow_integration_py312:
    uses: ./.github/workflows/reusable_airflow_integration.yml
    with:
      package-name: ${{ inputs.package-name }}
      airflow-version: ${{ inputs.airflow-version }}
      python-version: ${{ inputs.py312-version }}

  airflow_integration_py313:
    uses: ./.github/workflows/reusable_airflow_integration.yml
    with:
      package-name: ${{ inputs.package-name }}
      airflow-version: ${{ inputs.airflow-version }}
      python-version: ${{ inputs.py313-version }}

  summary:
    name: airflow suite summary
    if: ${{ always() }}
    needs:
      - airflow_integration_py312
      - airflow_integration_py313
    runs-on: ubuntu-latest
    outputs:
      result_summary: ${{ steps.collect.outputs.result_summary }}

    steps:
      - id: collect
        shell: bash
        run: |
          set -euo pipefail

          RESULT_SUMMARY="py312=${{ needs.airflow_integration_py312.result }}, py313=${{ needs.airflow_integration_py313.result }}"
          echo "result_summary=${RESULT_SUMMARY}" >> "$GITHUB_OUTPUT"
          echo "${RESULT_SUMMARY}"

          if [ "${{ needs.airflow_integration_py312.result }}" != "success" ] || [ "${{ needs.airflow_integration_py313.result }}" != "success" ]; then
            echo "At least one Airflow integration lane failed."
            exit 1
          fi
