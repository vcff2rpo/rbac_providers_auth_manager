name: reusable review PR gate

on:
  workflow_call:
    inputs:
      create-review-pr:
        description: Whether PR creation is requested for this run
        required: false
        type: boolean
        default: true
      source-branch:
        description: Tested source branch
        required: false
        type: string
        default: v86
      base-branch:
        description: Target branch for the PR
        required: false
        type: string
        default: main
      review-branch-prefix:
        description: Prefix used for the generated review branch
        required: false
        type: string
        default: ready/v86
      pr-title:
        description: Pull request title
        required: false
        type: string
        default: "Review: v86 ready for main"
      quality-result:
        description: Result of the quality lane
        required: false
        type: string
        default: unknown
      deep-validation-enabled:
        description: Whether deep validation was enabled
        required: false
        type: boolean
        default: false
      deep-validation-result:
        description: Result of the deep validation lane
        required: false
        type: string
        default: skipped
      airflow-enabled:
        description: Whether the Airflow suite was enabled
        required: false
        type: boolean
        default: false
      airflow-result:
        description: Detailed result summary of the Airflow suite
        required: false
        type: string
        default: skipped
      airflow-suite-result:
        description: Overall result of the Airflow suite
        required: false
        type: string
        default: skipped
      idp-enabled:
        description: Whether identity-provider integration was enabled
        required: false
        type: boolean
        default: false
      idp-result:
        description: Result of the identity-provider integration lane
        required: false
        type: string
        default: skipped
      fab-provider-enabled:
        description: Whether the FAB provider mirror validation lane was enabled
        required: false
        type: boolean
        default: false
      fab-provider-result:
        description: Result of the FAB provider mirror validation lane
        required: false
        type: string
        default: skipped
      run-url:
        description: URL of the current workflow run
        required: false
        type: string
        default: ""
      source-sha:
        description: Source commit SHA
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  gate:
    name: evaluate review PR gate
    runs-on: ubuntu-latest
    outputs:
      should_open_pr: ${{ steps.evaluate.outputs.should_open_pr }}
      gate_reason: ${{ steps.evaluate.outputs.gate_reason }}

    steps:
      - id: evaluate
        shell: bash
        run: |
          set -euo pipefail

          SHOULD_OPEN_PR=true
          REASONS=()

          if [ "${{ inputs.create-review-pr }}" != "true" ]; then
            SHOULD_OPEN_PR=false
            REASONS+=("create_review_pr=false")
          fi

          if [ "${{ inputs.quality-result }}" != "success" ]; then
            SHOULD_OPEN_PR=false
            REASONS+=("quality=${{ inputs.quality-result }}")
          fi

          if [ "${{ inputs.deep-validation-enabled }}" = "true" ] && [ "${{ inputs.deep-validation-result }}" != "success" ]; then
            SHOULD_OPEN_PR=false
            REASONS+=("deep_validation=${{ inputs.deep-validation-result }}")
          fi

          if [ "${{ inputs.airflow-enabled }}" = "true" ] && [ "${{ inputs.airflow-suite-result }}" != "success" ]; then
            SHOULD_OPEN_PR=false
            REASONS+=("airflow_suite=${{ inputs.airflow-suite-result }}")
          fi

          if [ "${{ inputs.idp-enabled }}" = "true" ] && [ "${{ inputs.idp-result }}" != "success" ]; then
            SHOULD_OPEN_PR=false
            REASONS+=("idp=${{ inputs.idp-result }}")
          fi

          if [ "${{ inputs.fab-provider-enabled }}" = "true" ] && [ "${{ inputs.fab-provider-result }}" != "success" ]; then
            SHOULD_OPEN_PR=false
            REASONS+=("fab_provider=${{ inputs.fab-provider-result }}")
          fi

          if [ "${SHOULD_OPEN_PR}" = "true" ]; then
            GATE_REASON="all_enabled_gates_passed"
          else
            GATE_REASON="$(IFS=';'; echo "${REASONS[*]}")"
          fi

          echo "should_open_pr=${SHOULD_OPEN_PR}" >> "$GITHUB_OUTPUT"
          echo "gate_reason=${GATE_REASON}" >> "$GITHUB_OUTPUT"

          echo "Gate decision: ${SHOULD_OPEN_PR}"
          echo "Gate reason: ${GATE_REASON}"

  open_review_pr:
    needs:
      - gate
    if: ${{ needs.gate.outputs.should_open_pr == 'true' }}
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
    uses: ./.github/workflows/reusable_open_pr.yml
    with:
      source_branch: ${{ inputs.source-branch }}
      base_branch: ${{ inputs.base-branch }}
      review_branch_prefix: ${{ inputs.review-branch-prefix }}
      pr_title: ${{ inputs.pr-title }}
      quality_result: ${{ inputs.quality-result }}
      deep_validation_result: ${{ inputs.deep-validation-enabled && inputs.deep-validation-result || 'skipped' }}
      airflow_result: ${{ inputs.airflow-enabled && inputs.airflow-result || 'skipped' }}
      idp_result: ${{ inputs.idp-enabled && inputs.idp-result || 'skipped' }}
      fab_provider_result: ${{ inputs.fab-provider-enabled && inputs.fab-provider-result || 'skipped' }}
      run_url: ${{ inputs.run-url }}
      source_sha: ${{ inputs.source-sha }}
