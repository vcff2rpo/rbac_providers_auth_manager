name: reusable airflow integration

on:
  workflow_call:
    inputs:
      package-name:
        description: Python package name
        required: false
        type: string
        default: rbac_providers_auth_manager
      airflow-version:
        description: Airflow version to install
        required: false
        type: string
        default: "3.1.8"
      python-version:
        description: Python version for integration test
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  airflow-integration:
    name: airflow integration (Python ${{ inputs.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      PACKAGE_NAME: ${{ inputs.package-name }}
      AIRFLOW_VERSION: ${{ inputs.airflow-version }}
      PYTHONPATH: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-airflow-integration.txt
            tests/ci/*.py

      - name: Initialize Airflow runtime paths
        run: |
          echo "AIRFLOW_HOME=${RUNNER_TEMP}/airflow-home" >> "$GITHUB_ENV"
          echo "AIRFLOW_CONFIG=${RUNNER_TEMP}/airflow-home/airflow.cfg" >> "$GITHUB_ENV"
          echo "AIRFLOW_DATA_DIR=${RUNNER_TEMP}/airflow-home/data" >> "$GITHUB_ENV"
          echo "AIRFLOW_PLUGINS_DIR=${RUNNER_TEMP}/airflow-home/plugins" >> "$GITHUB_ENV"
          echo "AIRFLOW_DAGS_DIR=${RUNNER_TEMP}/airflow-home/dags" >> "$GITHUB_ENV"
          echo "AIRFLOW_DB_PATH=${RUNNER_TEMP}/airflow-home/airflow.db" >> "$GITHUB_ENV"
          echo "AIRFLOW_PLUGIN_ZIP=${RUNNER_TEMP}/airflow-home/plugins/rbac_providers_auth_manager.zip" >> "$GITHUB_ENV"
          echo "AIRFLOW_PERMISSIONS_INI=${RUNNER_TEMP}/airflow-home/plugins/rbac_providers_auth_manager_permissions.ini" >> "$GITHUB_ENV"
          echo "AIRFLOW_CI_ARTIFACTS=${RUNNER_TEMP}/airflow-artifacts" >> "$GITHUB_ENV"

      - name: Show context
        run: |
          echo "Repository:              $GITHUB_REPOSITORY"
          echo "Ref:                     $GITHUB_REF"
          echo "SHA:                     $GITHUB_SHA"
          echo "Python:                  $(python --version)"
          echo "Airflow:                 ${AIRFLOW_VERSION}"
          echo "AIRFLOW_HOME:            $AIRFLOW_HOME"
          echo "AIRFLOW_CONFIG:          $AIRFLOW_CONFIG"
          echo "AIRFLOW_PLUGINS_DIR:     $AIRFLOW_PLUGINS_DIR"
          echo "AIRFLOW_DAGS_DIR:        $AIRFLOW_DAGS_DIR"
          echo "AIRFLOW_DATA_DIR:        $AIRFLOW_DATA_DIR"
          echo "AIRFLOW_DB_PATH:         $AIRFLOW_DB_PATH"
          echo "AIRFLOW_PLUGIN_ZIP:      $AIRFLOW_PLUGIN_ZIP"
          echo "AIRFLOW_PERMISSIONS_INI: $AIRFLOW_PERMISSIONS_INI"
          echo "AIRFLOW_CI_ARTIFACTS:    $AIRFLOW_CI_ARTIFACTS"

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install build prerequisites for python-ldap
        run: |
          bash scripts/ci/install_python_ldap_build_deps.sh
          sudo apt-get install -y curl jq

      - name: Resolve Airflow constraints URL
        run: |
          echo "AIRFLOW_CONSTRAINTS_URL=https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${{ inputs.python-version }}.txt" >> "$GITHUB_ENV"

      - name: Install Airflow core with matching constraints
        run: |
          python -m pip install "apache-airflow==${AIRFLOW_VERSION}" \
            --constraint "${AIRFLOW_CONSTRAINTS_URL}"

      - name: Install Airflow integration test dependencies without overriding Airflow pins
        run: |
          python -m pip install \
            --constraint "${AIRFLOW_CONSTRAINTS_URL}" \
            -r requirements-airflow-integration.txt

      - name: Prepare Airflow directories and stage plugin archive
        run: |
          set -euo pipefail
          mkdir -p "$AIRFLOW_HOME" "$AIRFLOW_DATA_DIR" "$AIRFLOW_PLUGINS_DIR" "$AIRFLOW_DAGS_DIR" "$AIRFLOW_CI_ARTIFACTS"
          python scripts/ci/bootstrap_airflow_runtime.py

      - name: Export plugin archive into PYTHONPATH
        run: echo "PYTHONPATH=${AIRFLOW_PLUGIN_ZIP}" >> "$GITHUB_ENV"

      - name: Create hello world DAG fixture
        run: python scripts/ci/create_hello_world_dag.py

      - name: Create and patch airflow.cfg
        run: |
          set -euo pipefail
          python scripts/ci/write_airflow_ci_config.py

      - name: Airflow info
        run: |
          set -o pipefail
          python -m airflow info 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/airflow-info.log"

      - name: Debug Python import path
        run: |
          python - <<'PY' 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/python-path.log"
          import os
          import sys
          print("cwd =", os.getcwd())
          print("PYTHONPATH =", os.environ.get("PYTHONPATH"))
          print("sys.path =", sys.path)
          PY

      - name: Pre-DB auth manager import and ldap smoke
        run: |
          python - <<'PY' 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/auth-manager-import.log"
          import os
          import sys
          import ldap
          print("plugin zip =", os.environ["AIRFLOW_PLUGIN_ZIP"])
          print("effective sys.path =", sys.path)
          print("python-ldap version =", getattr(ldap, "__version__", "unknown"))
          from rbac_providers_auth_manager.auth_manager import RbacAuthManager
          print("loaded auth manager =", RbacAuthManager.__name__)
          PY


      - name: Negative runtime smoke for missing auth manager class
        run: |
          set -euo pipefail
          BAD_CFG="$AIRFLOW_CI_ARTIFACTS/airflow-bad-auth-manager.cfg"
          cp "$AIRFLOW_CONFIG" "$BAD_CFG"
          python - <<'PY'
          import configparser
          import os
          from pathlib import Path

          cfg_path = Path(os.environ["AIRFLOW_CI_ARTIFACTS"]) / "airflow-bad-auth-manager.cfg"
          cfg = configparser.ConfigParser()
          cfg.read(cfg_path)
          cfg["core"]["auth_manager"] = "missing.module.DoesNotExist"
          with cfg_path.open("w", encoding="utf-8") as fh:
              cfg.write(fh)
          print(f"wrote bad auth manager cfg to {cfg_path}")
          PY

          set +e
          AIRFLOW_CONFIG="$BAD_CFG" python -W "ignore:Could not import graphviz:UserWarning" -m airflow info >"$AIRFLOW_CI_ARTIFACTS/airflow-bad-auth-manager.log" 2>&1
          AIRFLOW_INFO_RC=$?
          set -e

          cat "$AIRFLOW_CI_ARTIFACTS/airflow-bad-auth-manager.log"
          grep -E "missing\.module|DoesNotExist|auth_manager|ImportError|ModuleNotFoundError|cannot load CLI commands from auth manager|Auth manager is not configured" "$AIRFLOW_CI_ARTIFACTS/airflow-bad-auth-manager.log"

          if [ "$AIRFLOW_INFO_RC" -eq 0 ]; then
            echo "airflow info returned success, but emitted expected invalid-auth-manager warnings; treating as expected for this setup"
          else
            echo "airflow info failed as expected for invalid auth manager config"
          fi

      - name: Airflow DB bootstrap smoke with verbose logs
        run: |
          set -o pipefail
          AIRFLOW__LOGGING__LOGGING_LEVEL=DEBUG python -m airflow db migrate 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/airflow-db-migrate.log"

      - name: Discover hello world DAG and tasks using plain-text Airflow CLI
        run: bash scripts/ci/check_airflow_discovery.sh

      - name: Execute hello world DAG test run
        run: |
          set -o pipefail
          python -m airflow dags test hello_world_ci 2026-03-19T00:00:00+00:00 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/airflow-dags-test.log"

      - name: Start API server and capture verbose logs
        run: |
          set -e
          AIRFLOW__LOGGING__LOGGING_LEVEL=DEBUG python -m airflow api-server >"$AIRFLOW_CI_ARTIFACTS/api-server.log" 2>&1 &
          API_PID=$!
          echo "$API_PID" > "$AIRFLOW_CI_ARTIFACTS/api-server.pid"
          echo "api-server pid=$API_PID"

          for i in $(seq 1 40); do
            if curl -fsS "http://127.0.0.1:8080/api/v2/monitor/health" >"$AIRFLOW_CI_ARTIFACTS/health.json"; then
              break
            fi
            sleep 2
          done

          curl -fsS "http://127.0.0.1:8080/api/v2/version" >"$AIRFLOW_CI_ARTIFACTS/version.json"

          echo "==> api-server log tail"
          tail -n 200 "$AIRFLOW_CI_ARTIFACTS/api-server.log" || true

          if ! ps -p "$API_PID" >/dev/null 2>&1; then
            echo "api-server exited unexpectedly"
            exit 1
          fi

          if [ ! -s "$AIRFLOW_CI_ARTIFACTS/health.json" ]; then
            echo "health endpoint did not respond"
            exit 1
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          artifacts = Path(os.environ["AIRFLOW_CI_ARTIFACTS"])
          health = json.loads((artifacts / "health.json").read_text(encoding="utf-8"))
          version = json.loads((artifacts / "version.json").read_text(encoding="utf-8"))
          metadb = (health.get("metadatabase") or {}).get("status")
          if metadb != "healthy":
              raise SystemExit(f"metadatabase health is not healthy: {metadb!r}")
          print("validated metadatabase health:", metadb)
          print("api version payload keys:", sorted(version.keys()))
          PY

      - name: Validate login page and protected API behavior
        run: bash scripts/ci/check_airflow_auth_surface.sh

      - name: Run Airflow-aware smoke tests with verbose output
        run: |
          set -o pipefail
          python -m pytest -vv -rA -s --showlocals --durations=20 --log-cli-level=INFO \
            --maxfail=1 \
            --disable-warnings \
            --junitxml="$AIRFLOW_CI_ARTIFACTS/pytest-airflow.xml" \
            tests/ci/test_airflow_smoke.py 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/pytest-airflow.log"

      - name: Stop API server and print final logs
        if: always()
        run: |
          if [ -f "$AIRFLOW_CI_ARTIFACTS/api-server.pid" ]; then
            API_PID="$(cat "$AIRFLOW_CI_ARTIFACTS/api-server.pid")"
            kill "$API_PID" >/dev/null 2>&1 || true
            wait "$API_PID" >/dev/null 2>&1 || true
          fi
          echo "==> final api-server log tail"
          if [ -f "$AIRFLOW_CI_ARTIFACTS/api-server.log" ]; then
            tail -n 200 "$AIRFLOW_CI_ARTIFACTS/api-server.log" || true
          fi
          {
            echo "# Airflow integration summary"
            echo ""
            echo "- airflow-info.log"
            echo "- airflow-db-migrate.log"
            echo "- airflow-dags-list.log"
            echo "- airflow-tasks-list.log"
            echo "- airflow-dag-rendering-skipped.log"
            echo "- airflow-dags-test.log"
            echo "- api-server.log"
            echo "- health.json"
            echo "- version.json"
            echo "- auth-login.html"
            echo "- protected-dags.txt"
            echo "- auth-surface.log"
            echo "- pytest-airflow.log"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build airflow integration artifact summary
        if: always()
        run: |
          python scripts/ci/render_ci_scope_summary.py \
            --title "airflow integration scope"             --suite airflow_integration             --output "$AIRFLOW_CI_ARTIFACTS/airflow-scope.md"
          cat "$AIRFLOW_CI_ARTIFACTS/airflow-scope.md" >> "$GITHUB_STEP_SUMMARY"
          python scripts/ci/summarize_ci_artifacts.py \
            --artifact-dir $AIRFLOW_CI_ARTIFACTS             --lane-name "airflow integration"             --output-md "$AIRFLOW_CI_ARTIFACTS/artifact-summary.md"
          cat $AIRFLOW_CI_ARTIFACTS/artifact-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Airflow integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: airflow-integration-py${{ inputs.python-version }}
          path: |
            ${{ env.AIRFLOW_CI_ARTIFACTS }}
            ${{ env.AIRFLOW_CI_ARTIFACTS }}/airflow-scope.md
