name: reusable airflow integration

on:
  workflow_call:
    inputs:
      package-name:
        description: Python package name
        required: false
        type: string
        default: rbac_providers_auth_manager
      airflow-version:
        description: Airflow version to install
        required: false
        type: string
        default: "3.1.8"
      python-version:
        description: Python version for integration test
        required: true
        type: string

permissions:
  contents: read

jobs:
  airflow-integration:
    name: airflow integration (Python ${{ inputs.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      PACKAGE_NAME: ${{ inputs.package-name }}
      AIRFLOW_VERSION: ${{ inputs.airflow-version }}
      PYTHONPATH: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-airflow-integration.txt
            tests/ci/*.py

      - name: Initialize Airflow runtime paths
        run: |
          echo "AIRFLOW_HOME=${RUNNER_TEMP}/airflow-home" >> "$GITHUB_ENV"
          echo "AIRFLOW_CONFIG=${RUNNER_TEMP}/airflow-home/airflow.cfg" >> "$GITHUB_ENV"
          echo "AIRFLOW_DATA_DIR=${RUNNER_TEMP}/airflow-home/data" >> "$GITHUB_ENV"
          echo "AIRFLOW_PLUGINS_DIR=${RUNNER_TEMP}/airflow-home/plugins" >> "$GITHUB_ENV"
          echo "AIRFLOW_DAGS_DIR=${RUNNER_TEMP}/airflow-home/dags" >> "$GITHUB_ENV"
          echo "AIRFLOW_DB_PATH=${RUNNER_TEMP}/airflow-home/airflow.db" >> "$GITHUB_ENV"
          echo "AIRFLOW_PLUGIN_ZIP=${RUNNER_TEMP}/airflow-home/plugins/rbac_providers_auth_manager.zip" >> "$GITHUB_ENV"
          echo "AIRFLOW_PERMISSIONS_INI=${RUNNER_TEMP}/airflow-home/plugins/rbac_providers_auth_manager_permissions.ini" >> "$GITHUB_ENV"
          echo "AIRFLOW_CI_ARTIFACTS=${RUNNER_TEMP}/airflow-artifacts" >> "$GITHUB_ENV"

      - name: Show context
        run: |
          echo "Repository:              $GITHUB_REPOSITORY"
          echo "Ref:                     $GITHUB_REF"
          echo "SHA:                     $GITHUB_SHA"
          echo "Python:                  $(python --version)"
          echo "Airflow:                 ${AIRFLOW_VERSION}"
          echo "AIRFLOW_HOME:            $AIRFLOW_HOME"
          echo "AIRFLOW_CONFIG:          $AIRFLOW_CONFIG"
          echo "AIRFLOW_PLUGINS_DIR:     $AIRFLOW_PLUGINS_DIR"
          echo "AIRFLOW_DAGS_DIR:        $AIRFLOW_DAGS_DIR"
          echo "AIRFLOW_DATA_DIR:        $AIRFLOW_DATA_DIR"
          echo "AIRFLOW_DB_PATH:         $AIRFLOW_DB_PATH"
          echo "AIRFLOW_PLUGIN_ZIP:      $AIRFLOW_PLUGIN_ZIP"
          echo "AIRFLOW_PERMISSIONS_INI: $AIRFLOW_PERMISSIONS_INI"
          echo "AIRFLOW_CI_ARTIFACTS:    $AIRFLOW_CI_ARTIFACTS"

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install build prerequisites for python-ldap
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libldap2-dev libsasl2-dev libssl-dev curl jq

      - name: Resolve Airflow constraints URL
        run: |
          echo "AIRFLOW_CONSTRAINTS_URL=https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${{ inputs.python-version }}.txt" >> "$GITHUB_ENV"

      - name: Install Airflow core with matching constraints
        run: |
          python -m pip install "apache-airflow==${AIRFLOW_VERSION}" \
            --constraint "${AIRFLOW_CONSTRAINTS_URL}"

      - name: Install Airflow integration test dependencies without overriding Airflow pins
        run: |
          python -m pip install \
            --constraint "${AIRFLOW_CONSTRAINTS_URL}" \
            -r requirements-airflow-integration.txt

      - name: Prepare Airflow directories and stage plugin archive
        run: |
          set -e
          mkdir -p "$AIRFLOW_HOME" "$AIRFLOW_DATA_DIR" "$AIRFLOW_PLUGINS_DIR" "$AIRFLOW_DAGS_DIR" "$AIRFLOW_CI_ARTIFACTS"

          python - <<'PY'
          import os
          import shutil
          import zipfile
          from pathlib import Path

          pkg = os.environ["PACKAGE_NAME"]
          zip_path = Path(os.environ["AIRFLOW_PLUGIN_ZIP"])
          permissions_dst = Path(os.environ["AIRFLOW_PERMISSIONS_INI"])
          build_root = Path(os.environ["RUNNER_TEMP"]) / "plugin-build" / pkg

          if build_root.exists():
              shutil.rmtree(build_root)
          build_root.mkdir(parents=True, exist_ok=True)

          allowed = [
              "__init__.py",
              "auth_manager.py",
              "config.py",
              "api",
              "authorization",
              "compatibility",
              "config_runtime",
              "core",
              "entrypoints",
              "identity",
              "providers",
              "runtime",
              "services",
              "ui",
          ]

          for name in allowed:
              src = Path(name)
              if not src.exists():
                  continue
              dst = build_root / name
              if src.is_dir():
                  shutil.copytree(src, dst, dirs_exist_ok=True)
              else:
                  dst.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(src, dst)

          permission_candidates = [
              Path("config_runtime/permissions.ini"),
              Path("permissions.ini"),
              build_root / "config_runtime" / "permissions.ini",
          ]
          for candidate in permission_candidates:
              if candidate.exists():
                  permissions_dst.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(candidate, permissions_dst)
                  break
          else:
              raise SystemExit("Could not locate permissions.ini for staging")

          zip_path.parent.mkdir(parents=True, exist_ok=True)
          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in sorted(build_root.rglob("*")):
                  arcname = Path(pkg) / path.relative_to(build_root)
                  zf.write(path, arcname)

          print(f"staged plugin archive into {zip_path}")
          print(f"staged permissions.ini into {permissions_dst}")
          PY

      - name: Export plugin archive into PYTHONPATH
        run: echo "PYTHONPATH=${AIRFLOW_PLUGIN_ZIP}" >> "$GITHUB_ENV"

      - name: Create hello world DAG fixture
        run: |
          cat > "$AIRFLOW_DAGS_DIR/hello_world_ci.py" <<'PY'
          from __future__ import annotations
          from datetime import datetime
          from airflow import DAG
          from airflow.operators.empty import EmptyOperator

          with DAG(
              dag_id="hello_world_ci",
              start_date=datetime(2024, 1, 1),
              schedule=None,
              catchup=False,
              tags=["ci", "hello-world"],
          ) as dag:
              start = EmptyOperator(task_id="start")
              hello = EmptyOperator(task_id="hello")
              done = EmptyOperator(task_id="done")
              start >> hello >> done
          PY
          echo "==> hello_world_ci.py"
          cat "$AIRFLOW_DAGS_DIR/hello_world_ci.py"

      - name: Create and patch airflow.cfg
        run: |
          set -e
          python - <<'PY'
          import configparser
          import os
          from pathlib import Path

          cfg_path = Path(os.environ["AIRFLOW_CONFIG"])
          cfg_path.parent.mkdir(parents=True, exist_ok=True)

          cfg = configparser.ConfigParser()
          if cfg_path.exists():
              cfg.read(cfg_path)

          for section in ("core", "database", "api_auth", "api", "logging"):
              if section not in cfg:
                  cfg[section] = {}

          cfg["core"]["auth_manager"] = "rbac_providers_auth_manager.auth_manager.ItimLdapAuthManager"
          cfg["core"]["itim_ldap_permissions_ini"] = os.environ["AIRFLOW_PERMISSIONS_INI"]
          cfg["core"]["plugins_folder"] = os.environ["AIRFLOW_PLUGINS_DIR"]
          cfg["core"]["dags_folder"] = os.environ["AIRFLOW_DAGS_DIR"]
          cfg["core"]["lazy_load_plugins"] = "False"
          cfg["core"]["load_examples"] = "False"
          cfg["database"]["sql_alchemy_conn"] = f"sqlite:///{os.environ['AIRFLOW_DB_PATH']}"
          cfg["api"]["base_url"] = "http://127.0.0.1:8080"
          cfg["logging"]["logging_level"] = "DEBUG"

          cfg["api_auth"]["jwt_secret"] = "ci-only-jwt-secret-not-for-production-change-me-0123456789"
          cfg["api_auth"]["jwt_algorithm"] = "HS512"
          cfg["api_auth"]["jwt_audience"] = "urn:airflow.apache.org:task"

          with cfg_path.open("w", encoding="utf-8") as fh:
              cfg.write(fh)

          print(f"patched airflow.cfg at {cfg_path}")
          PY

          echo "==> airflow.cfg"
          cat "$AIRFLOW_CONFIG"

      - name: Airflow info
        run: |
          set -o pipefail
          python -m airflow info 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/airflow-info.log"

      - name: Airflow version
        run: |
          set -o pipefail
          python -m airflow version 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/airflow-version.log"

      - name: Debug Python import path
        run: |
          python - <<'PY' 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/python-path.log"
          import os
          import sys
          print("cwd =", os.getcwd())
          print("PYTHONPATH =", os.environ.get("PYTHONPATH"))
          print("sys.path =", sys.path)
          PY

      - name: Pre-DB auth manager import and ldap smoke
        run: |
          python - <<'PY' 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/auth-manager-import.log"
          import os
          import sys
          import ldap
          print("plugin zip =", os.environ["AIRFLOW_PLUGIN_ZIP"])
          print("effective sys.path =", sys.path)
          print("python-ldap version =", getattr(ldap, "__version__", "unknown"))
          from rbac_providers_auth_manager.auth_manager import ItimLdapAuthManager
          print("loaded auth manager =", ItimLdapAuthManager.__name__)
          PY

      - name: Airflow DB bootstrap smoke with verbose logs
        run: |
          set -o pipefail
          AIRFLOW__LOGGING__LOGGING_LEVEL=DEBUG python -m airflow db migrate 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/airflow-db-migrate.log"

      - name: Discover hello world DAG and tasks using supported Airflow CLI
        run: |
          set -o pipefail
          python -m airflow dags list --output json 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/airflow-dags-list.json"
          python -m airflow tasks list hello_world_ci --output json 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/airflow-tasks-list.json"
          {
            echo "Graphviz-dependent DAG rendering is intentionally skipped in CI."
            echo "DAG discovery is validated through 'airflow dags list', 'airflow tasks list', and 'airflow dags test'."
          } | tee "$AIRFLOW_CI_ARTIFACTS/airflow-dag-rendering-skipped.log"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          artifacts = Path(os.environ["AIRFLOW_CI_ARTIFACTS"])
          dags = json.loads((artifacts / "airflow-dags-list.json").read_text(encoding="utf-8"))
          tasks = json.loads((artifacts / "airflow-tasks-list.json").read_text(encoding="utf-8"))

          dag_ids = {item.get("dag_id") for item in dags if isinstance(item, dict)}
          task_ids = {item.get("task_id") for item in tasks if isinstance(item, dict)}
          if "hello_world_ci" not in dag_ids:
              raise SystemExit(f"hello_world_ci not discovered in dags list: {sorted(dag_ids)}")
          expected = {"start", "hello", "done"}
          if not expected.issubset(task_ids):
              raise SystemExit(f"Missing expected tasks. got={sorted(task_ids)} expected={sorted(expected)}")
          print("validated dag discovery for hello_world_ci")
          print("validated task discovery:", sorted(task_ids))
          PY

      - name: Execute hello world DAG test run
        run: |
          set -o pipefail
          python -m airflow dags test hello_world_ci 2026-03-19T00:00:00+00:00 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/airflow-dags-test.log"
          python -m airflow tasks states-for-dag-run hello_world_ci 2026-03-19T00:00:00+00:00 --output json 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/airflow-task-states.json"

      - name: Start API server and capture verbose logs
        run: |
          set -e
          AIRFLOW__LOGGING__LOGGING_LEVEL=DEBUG python -m airflow api-server >"$AIRFLOW_CI_ARTIFACTS/api-server.log" 2>&1 &
          API_PID=$!
          echo "$API_PID" > "$AIRFLOW_CI_ARTIFACTS/api-server.pid"
          echo "api-server pid=$API_PID"

          for i in $(seq 1 40); do
            if curl -fsS "http://127.0.0.1:8080/api/v2/monitor/health" >"$AIRFLOW_CI_ARTIFACTS/health.json"; then
              break
            fi
            sleep 2
          done

          curl -fsS "http://127.0.0.1:8080/api/v2/version" >"$AIRFLOW_CI_ARTIFACTS/version.json"

          echo "==> api-server log tail"
          tail -n 200 "$AIRFLOW_CI_ARTIFACTS/api-server.log" || true

          if ! ps -p "$API_PID" >/dev/null 2>&1; then
            echo "api-server exited unexpectedly"
            exit 1
          fi

          if [ ! -s "$AIRFLOW_CI_ARTIFACTS/health.json" ]; then
            echo "health endpoint did not respond"
            exit 1
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          artifacts = Path(os.environ["AIRFLOW_CI_ARTIFACTS"])
          health = json.loads((artifacts / "health.json").read_text(encoding="utf-8"))
          version = json.loads((artifacts / "version.json").read_text(encoding="utf-8"))
          metadb = (health.get("metadatabase") or {}).get("status")
          if metadb != "healthy":
              raise SystemExit(f"metadatabase health is not healthy: {metadb!r}")
          print("validated metadatabase health:", metadb)
          print("api version payload keys:", sorted(version.keys()))
          PY

      - name: Run Airflow-aware smoke tests with verbose output
        run: |
          set -o pipefail
          python -m pytest -vv -rA -s --showlocals --durations=20 --log-cli-level=INFO \
            --maxfail=1 \
            --disable-warnings \
            --junitxml="$AIRFLOW_CI_ARTIFACTS/pytest-airflow.xml" \
            tests/ci/test_airflow_smoke.py 2>&1 | tee "$AIRFLOW_CI_ARTIFACTS/pytest-airflow.log"

      - name: Stop API server and print final logs
        if: always()
        run: |
          if [ -f "$AIRFLOW_CI_ARTIFACTS/api-server.pid" ]; then
            API_PID="$(cat "$AIRFLOW_CI_ARTIFACTS/api-server.pid")"
            kill "$API_PID" >/dev/null 2>&1 || true
            wait "$API_PID" >/dev/null 2>&1 || true
          fi
          echo "==> final api-server log tail"
          tail -n 200 "$AIRFLOW_CI_ARTIFACTS/api-server.log" || true
          {
            echo "# Airflow integration summary"
            echo ""
            echo "- airflow-info.log"
            echo "- airflow-version.log"
            echo "- airflow-db-migrate.log"
            echo "- airflow-dags-list.json"
            echo "- airflow-tasks-list.json"
            echo "- airflow-dag-rendering-skipped.log"
            echo "- airflow-dags-test.log"
            echo "- airflow-task-states.json"
            echo "- api-server.log"
            echo "- health.json"
            echo "- version.json"
            echo "- pytest-airflow.log"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Airflow integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: airflow-integration-py${{ inputs.python-version }}
          path: ${{ env.AIRFLOW_CI_ARTIFACTS }}
