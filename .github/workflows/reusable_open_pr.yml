name: reusable open pr

on:
  workflow_call:
    inputs:
      source_branch:
        description: Tested source branch
        required: false
        type: string
        default: v86
      base_branch:
        description: Target branch for the PR
        required: false
        type: string
        default: main
      review_branch_prefix:
        description: Prefix used for the generated review branch
        required: false
        type: string
        default: ready/v86
      pr_title:
        description: Pull request title
        required: false
        type: string
        default: "Review: v86 ready for main"
      quality_result:
        description: Result of quality job
        required: false
        type: string
        default: unknown
      deep_validation_result:
        description: Result of deep validation job
        required: false
        type: string
        default: unknown
      airflow_result:
        description: Result summary of Airflow integration jobs
        required: false
        type: string
        default: unknown
      idp_result:
        description: Result of identity-provider integration job
        required: false
        type: string
        default: unknown
      run_url:
        description: URL of the current workflow run
        required: false
        type: string
        default: ""
      source_sha:
        description: Source commit SHA
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  open_review_pr:
    name: open review PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tested source branch
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_branch }}
          fetch-depth: 0

      - name: Resolve target base branch
        id: resolve_base
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const requestedBase = `${{ inputs.base_branch }}`.trim();

            const { data: repoData } = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoData.default_branch;

            async function branchExists(branch) {
              if (!branch) {
                return false;
              }
              try {
                await github.rest.repos.getBranch({ owner, repo, branch });
                return true;
              } catch (error) {
                if (error.status === 404) {
                  return false;
                }
                throw error;
              }
            }

            let effectiveBase = requestedBase || defaultBranch;
            let resolution = requestedBase ? 'requested' : 'default';

            if (!(await branchExists(effectiveBase))) {
              effectiveBase = defaultBranch;
              resolution = requestedBase ? 'default-fallback' : 'default';
            }

            if (!(await branchExists(effectiveBase))) {
              core.setFailed(
                `Unable to resolve a valid PR base branch. requested='${requestedBase || '(empty)'}', default='${defaultBranch}'`,
              );
              return;
            }

            core.notice(
              `PR base branch resolved to '${effectiveBase}' (requested='${requestedBase || '(empty)'}', default='${defaultBranch}', mode='${resolution}').`,
            );

            core.setOutput('requested_base', requestedBase);
            core.setOutput('default_base', defaultBranch);
            core.setOutput('effective_base', effectiveBase);
            core.setOutput('resolution', resolution);

      - name: Create generated review branch from tested source commit
        id: review_branch
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_SHA="${{ inputs.source_sha }}"
          if [ -z "$SOURCE_SHA" ]; then
            SOURCE_SHA="$(git rev-parse HEAD)"
          fi

          SHORT_SHA="$(git rev-parse --short=12 "$SOURCE_SHA")"
          REVIEW_BRANCH="${{ inputs.review_branch_prefix }}-${SHORT_SHA}-${GITHUB_RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch --no-tags --prune origin "+refs/heads/${{ inputs.source_branch }}:refs/remotes/origin/${{ inputs.source_branch }}"
          git checkout --detach "$SOURCE_SHA"
          git branch -f "$REVIEW_BRANCH" "$SOURCE_SHA"
          git push origin "$SOURCE_SHA:refs/heads/$REVIEW_BRANCH"

          echo "review_branch=$REVIEW_BRANCH" >> "$GITHUB_OUTPUT"
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Open pull request from generated branch to base
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = '${{ steps.review_branch.outputs.review_branch }}';
            const base = '${{ steps.resolve_base.outputs.effective_base }}';
            const title = '${{ inputs.pr_title }}';
            const sourceSha = '${{ steps.review_branch.outputs.source_sha }}';

            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${head}`,
              base,
              per_page: 100,
            });

            const body = [
              `Automated PR created from \`${{ inputs.source_branch }}\` after all enabled CI gates completed successfully.`,
              '',
              `Generated review branch: \`${head}\``,
              `Source branch: \`${{ inputs.source_branch }}\``,
              `Source SHA: \`${sourceSha}\``,
              `Target branch: \`${base}\``,
              `Requested base branch: \`${{ steps.resolve_base.outputs.requested_base || '(empty)' }}\``,
              `Repository default branch: \`${{ steps.resolve_base.outputs.default_base }}\``,
              `Base resolution mode: \`${{ steps.resolve_base.outputs.resolution }}\``,
              `Workflow run: ${{ inputs.run_url }}`,
              '',
              'CI result summary:',
              `- quality: ${{ inputs.quality_result }}`,
              `- deep-validation: ${{ inputs.deep_validation_result }}`,
              `- airflow-integration: ${{ inputs.airflow_result }}`,
              `- identity-provider-integration: ${{ inputs.idp_result }}`,
              '',
              'This PR branch points to the tested source commit and does not add post-test review artifacts.',
            ].join('\n');

            if (existing.length > 0) {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: existing[0].number,
                title,
                body,
                base,
              });
              core.notice(`Updated existing PR: ${existing[0].html_url}`);
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head,
              base,
              body,
              maintainer_can_modify: true,
            });

            core.notice(`Created PR: ${created.data.html_url}`);
